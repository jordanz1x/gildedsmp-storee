<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout - GildedSMP Store</title>
  <style>
    :root {
      --bg: #0a0a0a;
      --accent: #0066ff;
      --accent-light: #0080ff;
      --text: #ffffff;
      --text-muted: #b0b0b0;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      margin: 0;
      padding: 0;
    }

    body {
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Ubuntu, "Helvetica Neue", Arial, "Noto Sans", sans-serif;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 100vh;
    }

    .container {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .logo {
      text-align: center;
      margin-bottom: 3rem;
    }

    .logo-icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 1rem;
      background: linear-gradient(135deg, #0066ff, #0080ff);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      border: 3px solid #0066ff;
    }

    .logo-text {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--text);
    }

    .checkout-box {
      background: #1a1a1a;
      border-radius: 24px;
      padding: 3rem 2rem;
      max-width: 500px;
      width: 100%;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .checkout-box h2 {
      text-align: center;
      font-size: 1.5rem;
      margin: 0 0 2rem 0;
      font-weight: 700;
    }

    .platform-buttons {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
      justify-content: center;
    }

    .platform-btn {
      padding: 0.75rem 1.5rem;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: white;
      font-weight: 700;
      cursor: pointer;
      transition: all 200ms ease;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .platform-btn:hover {
      background: var(--accent-light);
      transform: translateY(-2px);
    }

    .platform-btn.secondary {
      background: #2a2a2a;
      border: 1px solid rgba(255, 255, 255, 0.1);
      cursor: pointer;
    }

    .platform-btn.secondary:hover {
      background: #3a3a3a;
    }

    .input-section {
      display: flex;
      gap: 0.75rem;
      align-items: center;
    }

    .input-section input {
      flex: 1;
      padding: 0.75rem;
      background: #2a2a2a;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      color: var(--text);
      font-family: inherit;
      font-size: 0.9rem;
    }

    .input-section input::placeholder {
      color: var(--text-muted);
    }

    .input-section input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0, 102, 255, 0.1);
    }

    .continue-btn {
      padding: 0.75rem 1.5rem;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: white;
      font-weight: 700;
      cursor: pointer;
      transition: all 200ms ease;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .continue-btn:hover {
      background: var(--accent-light);
      transform: translateY(-2px);
    }

    footer {
      background: #0f0f0f;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      padding: 2rem 1rem;
      text-align: center;
    }

    .footer-logo {
      font-size: 0.9rem;
      font-weight: 700;
      margin-bottom: 1rem;
      color: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .footer-links {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      flex-wrap: wrap;
      font-size: 0.75rem;
    }

    .footer-links a {
      color: var(--accent);
      text-decoration: none;
      transition: color 200ms ease;
    }

    .footer-links a:hover {
      color: var(--accent-light);
    }

    @media (max-width: 768px) {
      .checkout-box {
        padding: 2rem 1.5rem;
      }

      .platform-buttons {
        flex-direction: column;
      }

      .platform-btn {
        width: 100%;
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <div class="logo-icon">🔑</div>
      <div class="logo-text">GILDEDSMP.NET</div>
    </div>

    <div class="checkout-box">
      <h2>Enter your Minecraft Username</h2>

      <div class="platform-buttons">
        <button class="platform-btn">☕ JAVA</button>
        <button class="platform-btn secondary">🎮 BEDROCK</button>
      </div>

      <div class="input-section">
        <input type="text" id="username" placeholder="Enter your username" />
        <button class="continue-btn" onclick="continuePurchase()">Continue →</button>
      </div>
    </div>
  </div>

  <footer>
    <div class="footer-logo">🔑 GILDED SMP</div>
    <div class="footer-links">
      <a href="#">STORE PRIVACY POLICY</a>
      <a href="#">DONUT PRIVACY POLICY</a>
      <a href="#">SUPPORT</a>
      <a href="#">TERMS OF SERVICE</a>
      <a href="#">REFUND POLICY</a>
    </div>
  </footer>

  <script>
    // Get item data from URL
    const params = new URLSearchParams(window.location.search);
    const itemName = params.get('item') || 'Common';
    const itemPrice = params.get('price') || '0.49';
    let platform = 'java'; // default

    function continuePurchase() {
      const username = document.getElementById('username').value;
      if (username.trim()) {
        window.location.href = 'payment.html?username=' + encodeURIComponent(username) + '&item=' + encodeURIComponent(itemName) + '&price=' + encodeURIComponent(itemPrice) + '&platform=' + platform;
      } else {
        alert('Please enter your Minecraft username');
      }
    }

    document.getElementById('username').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        continuePurchase();
      }
    });

    // Platform selection
    document.querySelectorAll('.platform-btn').forEach((btn, index) => {
      btn.addEventListener('click', function(e) {
        e.preventDefault();
        document.querySelectorAll('.platform-btn').forEach(b => b.classList.add('secondary'));
        this.classList.remove('secondary');
        
        if (this.textContent.includes('JAVA')) {
          platform = 'java';
        } else {
          platform = 'bedrock';
        }
      });
      
      // Set initial state
      if (index === 0) {
        btn.classList.remove('secondary');
      } else {
        btn.classList.add('secondary');
      }
    });
  </script>
</body>
</html>
